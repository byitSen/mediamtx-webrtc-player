# MediaMTX 配置 - WebRTC 流（H.265 源自动转 H.264 后透传）
# 与前端播放器默认对接：WebRTC 端口 8889，路径如 cam1 → http://localhost:8889/cam1/whep
# 依赖：系统已安装 FFmpeg（用于 H.265→H.264 转码）。拉流用 TCP 减少丢包；FFmpeg 用软解避免 macOS VideoToolbox 与 libx264 的 v024 格式不兼容。

###############################################
# 全局
###############################################
logLevel: info
logDestinations: [stdout]

readTimeout: 10s
writeTimeout: 10s

###############################################
# WebRTC 服务（H.265/HEVC 在支持的浏览器下可发布与拉流）
###############################################
webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins: ['*']
# 本地 UDP 端口，供 WebRTC 媒体传输
webrtcLocalUDPAddress: :8189
# 可选：TCP 回退（NAT/防火墙环境下更稳定）
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: true
webrtcAdditionalHosts: []
# 可选：STUN 便于在复杂网络下建立连接
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s

###############################################
# RTSP（用于拉取摄像头等 H.265 源并转为 WebRTC）
###############################################
rtsp: true
rtspAddress: :8554
rtspTransports: [udp, tcp]

###############################################
# HLS（可选，用于非 WebRTC 播放）
###############################################
hls: false
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

###############################################
# 路径：H.265 源 → FFmpeg 转 H.264 → WebRTC 透传
# 前端 WHEP 拉流地址：http://localhost:8889/cam1/whep（拉到的已是 H.264）
###############################################
paths:
  # 内部路径：仅拉取摄像头 H.265 源（TCP 拉流减少丢包，避免 invalid fragmentation unit）
  cam1_raw:
    source: rtsp://admin:wcyj123456@192.168.1.3:554/cam/realmonitor?channel=1&subtype=0
    rtspTransport: tcp
    sourceOnDemand: true
    sourceOnDemandStartTimeout: 10s
    sourceOnDemandCloseAfter: 10s
  # 对外路径：有读者时启动 FFmpeg 从 cam1_raw 取流，软解 H.265 转 H.264 后发布到 cam1
  cam1:
    runOnDemand: ffmpeg -rtsp_transport tcp -i rtsp://localhost:$RTSP_PORT/cam1_raw -map 0:v:0 -c:v libx264 -pix_fmt yuv420p -preset ultrafast -b:v 600k -max_muxing_queue_size 1024 -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: true
    runOnDemandStartTimeout: 15s
    runOnDemandCloseAfter: 10s
    # 内部路径：仅拉取摄像头 H.265 源（TCP 拉流减少丢包，避免 invalid fragmentation unit）
  cam2_raw:
    source: rtsp://admin:wcyj123456@192.168.1.3:554/cam/realmonitor?channel=8&subtype=0
    rtspTransport: tcp
    sourceOnDemand: true
    sourceOnDemandStartTimeout: 10s
    sourceOnDemandCloseAfter: 10s
  # 对外路径：有读者时启动 FFmpeg 从 cam1_raw 取流，软解 H.265 转 H.264 后发布到 cam1
  cam2:
    runOnDemand: ffmpeg -rtsp_transport tcp -i rtsp://localhost:$RTSP_PORT/cam2_raw -map 0:v:0 -c:v libx264 -pix_fmt yuv420p -preset ultrafast -b:v 600k -max_muxing_queue_size 1024 -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: true
    runOnDemandStartTimeout: 15s
    runOnDemandCloseAfter: 10s
  cam3_raw:
    source: rtsp://admin:wcyj123456@192.168.1.3:554/cam/realmonitor?channel=16&subtype=0
    rtspTransport: tcp
    sourceOnDemand: true
    sourceOnDemandStartTimeout: 10s
    sourceOnDemandCloseAfter: 10s
  # 对外路径：有读者时启动 FFmpeg 从 cam1_raw 取流，软解 H.265 转 H.264 后发布到 cam1
  cam3:
    runOnDemand: ffmpeg -rtsp_transport tcp -i rtsp://localhost:$RTSP_PORT/cam3_raw -map 0:v:0 -c:v libx264 -pix_fmt yuv420p -preset ultrafast -b:v 600k -max_muxing_queue_size 1024 -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: true
    runOnDemandStartTimeout: 15s
    runOnDemandCloseAfter: 10s

###############################################
# 路径默认（未在 paths 中声明的路径均使用此配置）
###############################################
pathDefaults:
  source: publisher
  overridePublisher: true
  sourceOnDemand: false
